name: Build & Deploy Chào Market Accounts

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: minhhauluong/account-chaomarket

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker stop account-chaomarket 2>/dev/null || true
            docker rm account-chaomarket 2>/dev/null || true
            docker run -d \
              --name account-chaomarket \
              --network chaomarket \
              --env-file /root/account-chaomarket/.env \
              -p 3002:3002 \
              --restart unless-stopped \
              ${{ env.IMAGE_NAME }}:latest
            sleep 3
            curl -sf http://localhost:3002/health && echo "✅ Deployed successfully" || echo "❌ Health check failed"
